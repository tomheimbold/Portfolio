services:

  nginx:
    image: nginx:alpine
    container_name: portfolio-nginx
    restart: unless-stopped

    ports:
      - "8080:80"         # Container Port 80
      - "8443:443"        # für https unterstützung

    volumes:
      # Nginx Konfiguration mounten
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

      # Self-signed Zertifikate mounten
      - ./certs/selfsigned.crt:/etc/nginx/ssl/selfsigned.crt:ro
      - ./certs/selfsigned.key:/etc/nginx/ssl/selfsigned.key:ro
     
      # Website Dateien (HTML & CSS)
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./css:/usr/share/nginx/html/css:ro

    networks:
      - portfolio-net

networks:
  portfolio-net:
    driver: bridge
